<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard - TRAfrs</title>
<link rel="stylesheet" href="styles.css">
<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" aria-hidden="true"><rect rx="6" width="24" height="24" fill="#ffffff" opacity="0.05"/><path d="M6 12l4-4 4 4 4-4" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>TRAfrs</span>
  </div>

  <nav class="sidebar-nav">
    <a href="dashboard.html" class="active">Inicio</a>
    <a href="productos.html">Productos</a>
    <a href="agregar_producto.html">Agregar Producto</a>
  </nav>

  <div class="sidebar-footer">
    <button id="theme-toggle-sidebar" class="icon-btn">🌓</button>
    <small>Usuario: Estudiante</small>
  </div>
</div>

<div class="main">
  <header class="main-header">
    <h1>Panel de Control</h1>
    <div class="header-actions">
      <div class="stat card small">Transacciones: <span id="stat-trans">0</span></div>
      <div class="stat card small">Productos: <span id="stat-prod">0</span></div>
    </div>
  </header>

  <section class="cards">
    <div class="card animated">
      <h3>Resumen de transacciones</h3>
      <canvas id="txChart" height="120"></canvas>
    </div>
    <div class="card animated">
      <h3>Productos</h3>
      <div id="prod-list" class="list-panel"></div>
    </div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
