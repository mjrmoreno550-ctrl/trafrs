<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAfrs - App de Pagos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.primary{
    background:#2563eb;
    color:white;
}

.success{
    background:#22c55e;
    color:white;
}

.danger{
    background:#ef4444;
    color:white;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
    margin-bottom:10px;
}

#login{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
}

.hidden{
    display:none;
}

.transaction{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #334155;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}

@media(max-width:768px){
    .grid{
        display:block;
    }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <div class="card login-box">
        <h2 style="text-align:center;margin-bottom:20px;">💳 TRAfrs</h2>
        <input type="email" placeholder="Correo">
        <input type="password" placeholder="Contraseña">
        <button class="primary" style="width:100%;" onclick="login()">Iniciar Sesión</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <div class="container">
        <h2>Dashboard</h2>

        <div class="card">
            <h3>Saldo Disponible</h3>
            <h1 id="balance">$5,000</h1>
        </div>

        <div class="card">
            <h3>Enviar Dinero</h3>
            <input type="text" id="recipient" placeholder="Destinatario">
            <input type="number" id="amount" placeholder="Monto">
            <button class="primary" onclick="sendMoney()">Enviar</button>
        </div>

        <div class="card">
            <h3>Historial de Transacciones</h3>
            <div id="transactions"></div>
        </div>

        <div class="card">
            <h3>Gráfica Financiera</h3>
            <canvas id="financeChart"></canvas>
        </div>

        <button class="danger" onclick="logout()">Cerrar Sesión</button>

    </div>
</div>

<script>
let balance = 5000;
let transactions = [];

function login(){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadChart();
}

function logout(){
    location.reload();
}

function sendMoney(){
    let recipient = document.getElementById("recipient").value;
    let amount = parseFloat(document.getElementById("amount").value);

    if(!recipient || !amount || amount <= 0){
        alert("Datos inválidos");
        return;
    }

    if(amount > balance){
        alert("Saldo insuficiente");
        return;
    }

    balance -= amount;
    transactions.unshift({
        recipient,
        amount
    });

    updateUI();
}

function updateUI(){
    document.getElementById("balance").innerText = "$" + balance;

    let container = document.getElementById("transactions");
    container.innerHTML = "";

    transactions.forEach(t => {
        container.innerHTML += `
        <div class="transaction">
            <span>${t.recipient}</span>
            <span class="red">-$${t.amount}</span>
        </div>`;
    });
}

let chartInstance = null;

function loadChart(){

    const ctx = document.getElementById('financeChart');

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May'],
            datasets: [{
                label: 'Transacciones',
                data: [12, 19, 8, 15, 10]
            }]
        }
    });
}
